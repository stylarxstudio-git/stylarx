<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stylarx — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #050507;
    --surface: #0e0e12;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --violet: #7c6af5;
    --violet-glow: rgba(124,106,245,0.35);
    --cyan: #22d3ee;
    --text: #f0f0f5;
    --muted: #6b6b7a;
  }
  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { width: 500px; height: 500px; background: rgba(124,106,245,0.12); top: -100px; left: -100px; }
  .orb2 { width: 400px; height: 400px; background: rgba(34,211,238,0.08); bottom: -80px; right: -80px; animation-delay: -6s; }
  @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.08); } }

  .noise {
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  .card {
    position: relative; z-index: 1;
    background: rgba(14,14,18,0.9);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 52px 48px;
    width: 420px;
    backdrop-filter: blur(30px);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 40px 80px rgba(0,0,0,0.6), 0 0 100px var(--violet-glow);
    animation: cardIn 0.6s cubic-bezier(0.23,1,0.32,1) both;
  }
  @keyframes cardIn { from { opacity:0; transform: translateY(24px) scale(0.97); } to { opacity:1; transform: translateY(0) scale(1); } }

  .logo-wrap {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 36px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--violet), var(--cyan));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 16px; color: #fff;
    box-shadow: 0 0 20px var(--violet-glow);
  }
  .logo-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: -0.02em; }

  h1 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 28px; letter-spacing: -0.03em; margin-bottom: 8px; }
  .subtitle { color: var(--muted); font-size: 14px; font-weight: 300; margin-bottom: 36px; }

  label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .input-wrap { position: relative; margin-bottom: 24px; }
  input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.08em;
  }
  input[type="password"]:focus {
    border-color: var(--violet);
    box-shadow: 0 0 0 3px rgba(124,106,245,0.15);
  }
  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #f87171;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, var(--violet), #9f8ff7);
    border: none;
    border-radius: 10px;
    padding: 14px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.01em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 24px rgba(124,106,245,0.4);
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .btn:hover { opacity: 0.92; transform: translateY(-1px); }
  .btn:hover::before { transform: translateX(100%); }
  .btn:active { transform: translateY(0); }

  .footer-note { margin-top: 24px; text-align: center; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<div class="noise"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-mark">S</div>
    <span class="logo-name">Stylarx</span>
  </div>
  <h1>Welcome back</h1>
  <p class="subtitle">Enter your password to access the dashboard</p>

  {% if error %}
  <div class="error-msg">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="/login">
    <label for="pw">Access Password</label>
    <div class="input-wrap">
      <input type="password" id="pw" name="password" placeholder="••••••••••••" autofocus autocomplete="current-password">
    </div>
    <button type="submit" class="btn">Sign In →</button>
  </form>
  <p class="footer-note">Private access only. Set APP_PASSWORD env var to change.</p>
</div>
</body>
</html>
