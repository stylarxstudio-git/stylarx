<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STYLARX // SECURE ACCESS</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--green:#00ff41;--amber:#ff6600;--cyan:#00e5ff;--red:#ff2222;--bg:#000;--surface:#050505;--border:#00ff4133;}
body{background:var(--bg);color:var(--green);font-family:Consolas,'Courier New',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,0.015) 2px,rgba(0,255,65,0.015) 4px);pointer-events:none;z-index:0;}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,65,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,65,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.corner{position:fixed;width:60px;height:60px;border-color:var(--green);border-style:solid;opacity:0.3;}
.corner.tl{top:20px;left:20px;border-width:2px 0 0 2px;}
.corner.tr{top:20px;right:20px;border-width:2px 2px 0 0;}
.corner.bl{bottom:20px;left:20px;border-width:0 0 2px 2px;}
.corner.br{bottom:20px;right:20px;border-width:0 2px 2px 0;}
.card{position:relative;z-index:1;border:1px solid var(--green);padding:48px 44px;width:440px;background:rgba(0,5,0,0.95);}
.card::before{content:'';position:absolute;top:-1px;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent);}
.header-bar{display:flex;align-items:center;gap:12px;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.logo-box{width:36px;height:36px;border:1px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--green);position:relative;}
.logo-box::after{content:'';position:absolute;inset:2px;border:1px solid rgba(0,255,65,0.3);}
.logo-title{font-size:18px;font-weight:700;letter-spacing:0.15em;}
.logo-sub{font-size:10px;color:rgba(0,255,65,0.5);letter-spacing:0.2em;margin-top:2px;}
.sys-label{font-size:10px;letter-spacing:0.2em;color:rgba(0,255,65,0.5);margin-bottom:24px;text-transform:uppercase;}
h1{font-size:22px;font-weight:700;letter-spacing:0.1em;margin-bottom:6px;text-transform:uppercase;}
.sub{font-size:11px;color:rgba(0,255,65,0.5);letter-spacing:0.12em;margin-bottom:28px;}
.field-label{font-size:10px;letter-spacing:0.18em;color:rgba(0,255,65,0.6);margin-bottom:7px;text-transform:uppercase;}
.input-wrap{position:relative;margin-bottom:24px;}
input[type=password]{width:100%;background:rgba(0,255,65,0.04);border:1px solid rgba(0,255,65,0.35);padding:12px 16px;color:var(--green);font-family:Consolas,monospace;font-size:15px;letter-spacing:0.15em;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
input[type=password]:focus{border-color:var(--green);box-shadow:0 0 12px rgba(0,255,65,0.2),inset 0 0 8px rgba(0,255,65,0.05);}
input[type=password]::placeholder{color:rgba(0,255,65,0.25);letter-spacing:0.1em;}
.error{background:rgba(255,34,34,0.08);border:1px solid rgba(255,34,34,0.4);padding:10px 14px;font-size:11px;color:var(--red);letter-spacing:0.1em;margin-bottom:18px;}
.btn{width:100%;background:transparent;border:1px solid var(--green);padding:13px;color:var(--green);font-family:Consolas,monospace;font-size:13px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:all 0.2s;}
.btn::before{content:'';position:absolute;inset:0;background:var(--green);opacity:0;transition:opacity 0.2s;}
.btn:hover::before{opacity:0.08;}
.btn:hover{box-shadow:0 0 20px rgba(0,255,65,0.25);}
.btn:active{transform:scale(0.99);}
.status-bar{margin-top:20px;display:flex;align-items:center;gap:8px;font-size:10px;color:rgba(0,255,65,0.4);letter-spacing:0.12em;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
.blink{animation:blink 1s infinite;}
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="grid"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div class="card">
  <div class="header-bar">
    <div class="logo-box">S</div>
    <div><div class="logo-title">STYLARX</div><div class="logo-sub">COMMAND CENTER</div></div>
  </div>
  <div class="sys-label">// SECURE ACCESS TERMINAL</div>
  <h1>AUTHENTICATION<span class="blink">_</span></h1>
  <p class="sub">ENTER ACCESS CREDENTIAL TO PROCEED</p>
  {% if error %}<div class="error">⚠ {{ error }}</div>{% endif %}
  <form method="POST" action="/login">
    <div class="field-label">ACCESS KEY</div>
    <div class="input-wrap">
      <input type="password" name="password" placeholder="••••••••••••••••" autofocus autocomplete="current-password">
    </div>
    <button type="submit" class="btn">[ AUTHENTICATE ]</button>
  </form>
  <div class="status-bar"><div class="dot"></div>SYSTEM ONLINE &nbsp;|&nbsp; ENCRYPTED CHANNEL &nbsp;|&nbsp; AUTHORIZED ONLY</div>
</div>
</body>
</html>
