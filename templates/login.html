<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stylarx — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;
  background:#0a0a0f;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}
.bg{
  position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(99,102,241,0.15),transparent),
             radial-gradient(ellipse 60% 50% at 80% 80%,rgba(139,92,246,0.08),transparent);
  pointer-events:none;
}
.card{
  position:relative;
  width:400px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:44px 40px;
  backdrop-filter:blur(20px);
}
.logo{
  display:flex;align-items:center;gap:10px;margin-bottom:32px;
}
.logo-mark{
  width:36px;height:36px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#fff;
}
.logo-name{font-size:17px;font-weight:600;color:#fff;letter-spacing:-0.02em;}
h1{font-size:24px;font-weight:600;color:#fff;letter-spacing:-0.03em;margin-bottom:6px;}
.sub{font-size:14px;color:rgba(255,255,255,0.45);margin-bottom:28px;}
.field-label{font-size:12px;font-weight:500;color:rgba(255,255,255,0.55);margin-bottom:8px;letter-spacing:0.02em;}
input[type=password]{
  width:100%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;
  padding:12px 15px;
  color:#fff;
  font-family:'Inter',sans-serif;
  font-size:14px;
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
  margin-bottom:20px;
}
input[type=password]:focus{
  border-color:rgba(99,102,241,0.6);
  box-shadow:0 0 0 3px rgba(99,102,241,0.15);
}
input[type=password]::placeholder{color:rgba(255,255,255,0.2);}
.error{
  background:rgba(239,68,68,0.1);
  border:1px solid rgba(239,68,68,0.25);
  border-radius:8px;
  padding:10px 14px;
  font-size:13px;
  color:#fca5a5;
  margin-bottom:18px;
}
.btn{
  width:100%;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border:none;
  border-radius:10px;
  padding:13px;
  color:#fff;
  font-family:'Inter',sans-serif;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:opacity 0.2s,transform 0.1s;
  letter-spacing:-0.01em;
}
.btn:hover{opacity:0.9;}
.btn:active{transform:scale(0.99);}
.footer{margin-top:24px;text-align:center;font-size:12px;color:rgba(255,255,255,0.25);}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="logo">
    <div class="logo-mark">S</div>
    <div class="logo-name">Stylarx</div>
  </div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to your command center</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST" action="/login">
    <div class="field-label">Password</div>
    <input type="password" name="password" placeholder="Enter your password" autofocus autocomplete="current-password">
    <button type="submit" class="btn">Sign In</button>
  </form>
  <div class="footer">Stylarx Studio · Secure Access</div>
</div>
</body>
</html>
