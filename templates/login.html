<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Stylarx</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #050505;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.04em;
            text-shadow: 0 0 24px rgba(255,255,255,.7), 0 0 50px rgba(255,255,255,.3);
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #111;
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #fff;
            box-shadow: 0 0 8px rgba(255,255,255,0.2);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #fff;
            border: none;
            color: #000;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #ddd;
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
        }
        .error {
            color: #ff4444;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            text-shadow: 0 0 5px rgba(255,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>STYLARX</h1>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Enter Password" required>
            <button type="submit">Access</button>
        </form>
    </div>
</body>
</html>
