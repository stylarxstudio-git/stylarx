<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stylarx — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#000;color:#fff;font-family:'Space Mono',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;}
  .box{width:360px;padding:48px 40px;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:#050505;}
  h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.03em;margin-bottom:32px;text-shadow:0 0 30px rgba(255,255,255,.5);}
  .err{font-size:11px;color:#ff4444;margin-bottom:16px;padding:10px 12px;border:1px solid rgba(255,68,68,.2);border-radius:3px;background:rgba(255,68,68,.06);}
  input{width:100%;background:#0a0a0a;border:1px solid rgba(255,255,255,.12);border-radius:3px;padding:12px 14px;color:#fff;font-family:'Space Mono',monospace;font-size:13px;outline:none;margin-bottom:12px;}
  input:focus{border-color:rgba(255,255,255,.4);}
  button{width:100%;padding:12px;background:#fff;color:#000;border:none;border-radius:3px;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.04em;}
  button:hover{background:#e0e0e0;}
</style>
</head>
<body>
<div class="box">
  <h1>STYLARX</h1>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="POST">
    <input type="password" name="password" placeholder="Password" required autofocus>
    <button type="submit">ENTER</button>
  </form>
</div>
</body>
</html>
